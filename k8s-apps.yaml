apiVersion: apps/v1
kind: Deployment
metadata:
  name: conference-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conference-service
  template:
    metadata:
      labels:
        app: conference-service
    spec:
      containers:
        - name: conference-service
          image: conference-service:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: APP_VERSION
              value: "v1.0"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-db:5432/conference_catalog_db
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: SPRING_DATA_REDIS_HOST
              value: redis-cache
---
apiVersion: v1
kind: Service
metadata:
  name: conference-service
spec:
  type: NodePort
  selector:
    app: conference-service
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registration-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registration-service
  template:
    metadata:
      labels:
        app: registration-service
    spec:
      containers:
        - name: registration-service
          image: registration-service:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: APP_VERSION
              value: "v1.0"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-db:5432/conference_registration_db
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: CONFERENCE-SERVICE_URL
              value: http://conference-service:8081/api/v1/conferences
---
apiVersion: v1
kind: Service
metadata:
  name: registration-service
spec:
  type: NodePort
  selector:
    app: registration-service
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30082